п»ҝ<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dixit vs Impostor - Game Master</title>
    <!-- FIX HTML: Eliminada la referencia fantasma/doble a style-final.css si la hubiera -->
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;800&family=Macondo&family=Raleway:wght@400;700&family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

    <!-- NavegaciГғВіn Global (Fuera del contenedor para evitar clips en mГғВіvil) -->
    <nav id="global-nav" class="global-nav">
        <button id="btn-global-back" class="btn-nav btn-nav-back" title="AtrГғВЎs"></button>
        <button id="btn-global-home" class="btn-nav btn-nav-home" title="MenГғВә Principal"></button>
    </nav>

    <div id="app-container">
        <!-- Las pantallas se cargarГғВЎn dinГғВЎmicamente aquГғВӯ -->

        <main id="main-content">
            <div id="static-content">
                <!-- PANTALLA MENГғЕЎ PRINCIPAL -->
                <section id="screen-main-menu" class="screen main-menu-screen active">
                    <img src="assets/IMG/UI/menu/logo_dixit.png" alt="Dixit VS Impostor" class="main-logo"
                        onerror="this.style.display='none'">

                    <div class="main-menu-actions">
                        <button id="btn-menu-new" class="btn-book">NUEVA PARTIDA</button>
                        <div class="secondary-actions">
                            <button id="btn-menu-scores" class="btn-organic btn-stone">MARCADORES</button>
                            <button id="btn-menu-rules" class="btn-organic btn-petal">REGLAS</button>
                        </div>
                    </div>

                </section>

                <!-- El botГғВіn de ajustes se mueve aquГғВӯ para ser global -->
                <button id="btn-menu-settings" class="btn-settings" title="Ajustes"></button>

                <!-- PANTALLA SETUP -->
                <section id="screen-setup" class="screen">

                    <!-- ZONA 1: HEADER FIJO (siempre visible) -->
                    <div class="setup-header">
                        <h2 class="glow-text small">Nueva Partida</h2>
                    </div>

                    <div class="preset-section vortex-container">

                        <div id="preset-players-grid" class="preset-grid magic-vortex">
                            <!-- Chips generados por app.js -->
                        </div>
                    </div>

                    <!-- ZONA 2B: PERGAMINO CENTRAL FIJO (con scroll solo en lista de jug. nuevos) -->
                    <div class="setup-scroll-body layout-compact">
                        <div class="setup-parchment compact-card">

                            <div class="player-input-divider">
                                <span>O INVOCA UNO NUEVO</span>
                            </div>

                            <div class="player-input-container">
                                <input type="text" id="player-name" placeholder="ГӮВҝQuiГғВ©n se une al sueГғВұo?" autocomplete="off"
                                    class="dreamy-input">
                                <button id="add-player" class="btn-lacre" aria-label="Invocar Jugador"></button>
                            </div>

                            <!-- Lista de jugadores con scroll SOLO aquГғВӯ -->
                            <div class="player-list-wrapper">
                                <ul id="player-list">
                                    <!-- Jugadores generados por app.js -->
                                </ul>
                                <div class="scroll-fade-overlay"></div>
                            </div>

                        </div>
                    </div>

                    <!-- ZONA 3: FOOTER FIJO CON BOTГғвҖңN (siempre visible) -->
                    <div class="setup-footer">
                        <button id="btn-start-game" class="btn-primary" disabled>Comenzar Partida</button>
                    </div>

                </section>
            </div>

            <!-- Contenedor para InyecciГғВіn DinГғВЎmica SPA -->
            <div id="dynamic-content"></div>
        </main>
    </div>

    <!-- Modal de ConfirmaciГғВіn Personalizado -->
    <div id="modal-container" class="hidden">
        <div class="modal glass-card">
            <p id="modal-message">ГӮВҝEstГғВЎs seguro?</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn-primary">Confirmar</button>
                <button id="modal-btn-cancel" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Audio Global -->
    <audio id="bg-music" src="music/Clockwork%20Garden%20Carnival.mp3" loop preload="auto"></audio>

    <script src="app.js?v=5"></script>
</body>

</html>
